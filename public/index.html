<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KaiWorkbench</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.5/ace.js"></script>
<style>
  /* ── design tokens ── */
  :root {
    --bg:        #0c0c0f;
    --surface:   #13131a;
    --raised:    #1b1b26;
    --border:    #2a2a3d;
    --accent:    #7c6af7;
    --accent2:   #34c8a0;        /* teal for REPL success */
    --warn:      #e07060;
    --text:      #ddddf4;
    --muted:     #6868a8;
    --mono:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
    --sans:      -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius:    6px;
    --sidebar-w: 220px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  #root {
    width: 100%;
    height: 100%;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }

  /* ── header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    user-select: none;
  }
  .header-logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.5px;
    color: var(--accent);
  }
  .header-model {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }
  .model-select {
    min-width: 150px;
    max-width: 260px;
    padding: 5px 28px 5px 8px;
    color: var(--text);
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: 4px;
    font: 11px var(--mono);
    outline: none;
  }
  .model-select:focus { border-color: var(--accent); }
  .model-hint {
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .header-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    transition: background .4s;
    margin-left: auto;
  }
  .header-dot.online  { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .header-dot.error   { background: var(--warn); }
  .header-status { font-size: 11px; color: var(--muted); }
  .usage-badges {
    display: flex;
    align-items: center;
    gap: 6px;
    min-width: 0;
  }
  .resource-badge {
    font: 11px var(--mono);
    color: var(--muted);
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 4px 7px;
    white-space: nowrap;
    max-width: 96px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .resource-badge strong { color: var(--text); font-weight: 600; }

  /* ── tabs ── */
  .tabs {
    display: flex;
    gap: 2px;
    padding: 0 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tab {
    padding: 8px 16px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .5px;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    transition: color .15s, border-color .15s;
    text-transform: uppercase;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }
  .tab:hover:not(.active) { color: var(--text); }

  /* ── layout ── */
  .workspace {
    display: flex;
    flex: 1;
    width: 100%;
    min-height: 0;
    min-width: 0;
    overflow: hidden;
  }

  /* ── sidebar (file browser) ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    flex-shrink: 0;
  }
  .sidebar-header {
    padding: 8px 12px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sidebar-path {
    padding: 4px 12px;
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    background: var(--raised);
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 4px 0;
  }
  .sidebar-entry {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 12px;
    cursor: pointer;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text);
    transition: background .1s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sidebar-entry:hover { background: var(--raised); }
  .sidebar-entry.selected { background: #2020358f; color: var(--accent); }
  .sidebar-entry .icon { opacity: .7; font-size: 11px; flex-shrink: 0; }
  .sidebar-entry .name { overflow: hidden; text-overflow: ellipsis; }
  .sidebar-entry .size { margin-left: auto; font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .sidebar-back {
    color: var(--muted);
    font-size: 11px;
  }

  /* ── main panel ── */
  .main {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── CHAT ── */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    display: flex;
    gap: 12px;
    max-width: 860px;
    width: 100%;
    align-self: flex-start;
  }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    background: var(--accent);
    color: #fff;
  }
  .msg.user .msg-avatar { background: var(--raised); color: var(--muted); }
  .msg-body {
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    line-height: 1.6;
    max-width: 78%;
  }
  .msg.user .msg-body {
    background: #20203a;
    border-color: #3535608f;
  }
  .msg-body pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 10px 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.5;
  }
  .msg-body code {
    font-family: var(--mono);
    font-size: 12px;
    background: #1a1a2e;
    padding: 1px 4px;
    border-radius: 3px;
  }
  .msg-body pre code { background: transparent; padding: 0; }
  .thinking {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    border-left: 2px solid var(--border);
    padding-left: 8px;
    margin-bottom: 8px;
  }
  .request-progress {
    display: flex;
    align-items: center;
    gap: 8px;
    min-width: 220px;
    color: var(--muted);
    font: 11px var(--mono);
  }
  .request-spinner {
    width: 13px;
    height: 13px;
    flex-shrink: 0;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: request-spin .8s linear infinite;
  }
  .request-progress-track {
    position: relative;
    width: 110px;
    height: 3px;
    overflow: hidden;
    border-radius: 2px;
    background: var(--border);
  }
  .request-progress-bar {
    position: absolute;
    width: 45%;
    height: 100%;
    border-radius: inherit;
    background: var(--accent);
    animation: request-progress 1.2s ease-in-out infinite;
  }
  @keyframes request-spin { to { transform: rotate(360deg); } }
  @keyframes request-progress {
    from { transform: translateX(-110%); }
    to { transform: translateX(245%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .request-spinner, .request-progress-bar { animation-duration: 2.4s; }
  }
  .tool-card {
    min-width: 320px;
    max-width: min(720px, 70vw);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .tool-card-head {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    color: var(--accent);
    font: 11px var(--mono);
    border-bottom: 1px solid var(--border);
  }
  .tool-card pre {
    max-height: 320px;
    margin: 0;
    border: 0;
    border-radius: 0;
    white-space: pre-wrap;
  }
  .tool-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    padding: 8px 10px;
    border-top: 1px solid var(--border);
  }
  .msg-meta {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
  }
  .chat-image-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 8px;
  }
  .chat-image {
    position: relative;
    width: 108px;
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: #11111c;
  }
  .chat-image img {
    display: block;
    width: 100%;
    height: 78px;
    object-fit: cover;
    cursor: grab;
  }
  .chat-image img:active { cursor: grabbing; }
  .chat-image-caption {
    padding: 3px 5px;
    color: var(--muted);
    font: 10px var(--mono);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chat-image-remove {
    position: absolute;
    top: 3px;
    right: 3px;
    width: 20px;
    height: 20px;
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--warn);
    background: rgba(17,17,28,.85);
    cursor: pointer;
    line-height: 16px;
  }

  /* file injection pill */
  .file-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #1e1e30;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 2px 8px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    margin-bottom: 8px;
    cursor: default;
  }
  .file-pill button {
    background: none; border: none; color: var(--warn);
    cursor: pointer; padding: 0 2px; font-size: 13px; line-height: 1;
  }

  /* ── chat input ── */
  .chat-input-area {
    padding: 12px 24px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .chat-memory-bar {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    min-height: 20px;
    color: var(--muted);
    font: 10px var(--mono);
  }
  .chat-memory-clear {
    border: 0;
    background: transparent;
    color: var(--muted);
    font: inherit;
    cursor: pointer;
  }
  .chat-memory-clear:hover:not(:disabled) { color: var(--warn); }
  .chat-memory-clear:disabled { cursor: default; opacity: .45; }
  .chat-memory-link {
    border: 0;
    background: transparent;
    color: var(--muted);
    font: inherit;
    cursor: pointer;
    padding: 0;
  }
  .chat-memory-link:hover:not(:disabled) { color: var(--accent); }
  .chat-memory-link:disabled { cursor: default; opacity: .45; }
  .rag-select {
    background: var(--raised);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    font: 10px var(--mono);
    padding: 2px 5px;
    outline: none;
  }
  .memory-editor-backdrop {
    position: fixed;
    inset: 0;
    z-index: 30;
    background: rgba(5,5,8,.72);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .memory-editor {
    width: min(720px, 100%);
    height: min(520px, calc(100vh - 48px));
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 18px 50px rgba(0,0,0,.45);
    overflow: hidden;
  }
  .memory-editor-head {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    font: 11px var(--mono);
    color: var(--muted);
    flex-shrink: 0;
  }
  .memory-editor-head strong { color: var(--accent); font-size: 12px; }
  .memory-editor-body {
    flex: 1;
    min-height: 0;
    position: relative;
  }
  .memory-editor-ace {
    position: absolute;
    inset: 0;
  }
  .memory-editor-status {
    min-width: 110px;
    text-align: right;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .model-install-body {
    padding: 16px;
    overflow: auto;
    font: 12px/1.5 var(--mono);
    color: var(--text);
  }
  .model-install-progress {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 10px;
  }
  .model-install-spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: request-spin .8s linear infinite;
  }
  .model-install-track {
    height: 5px;
    overflow: hidden;
    border-radius: 3px;
    background: var(--border);
    margin: 8px 0 10px;
  }
  .model-install-bar {
    height: 100%;
    width: 0;
    border-radius: inherit;
    background: var(--accent);
    transition: width .18s ease;
  }
  .chat-input-files {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 8px;
    min-height: 0;
  }
  .chat-drop-hint {
    display: none;
    margin-bottom: 8px;
    padding: 8px 10px;
    border: 1px dashed var(--accent);
    border-radius: var(--radius);
    color: var(--accent);
    background: rgba(120, 119, 198, .08);
    font: 11px var(--mono);
  }
  .main.chat-drag-active .chat-drop-hint { display: block; }
  .chat-input-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
  }
  .chat-input-row textarea {
    flex: 1;
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 180px;
    transition: border-color .15s;
    line-height: 1.5;
  }
  .chat-input-row textarea:focus { border-color: var(--accent); }
  .btn {
    padding: 10px 16px;
    border-radius: var(--radius);
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: opacity .15s, background .15s;
  }
  .btn:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:not(:disabled):hover { opacity: .85; }
  .btn-ghost { background: var(--raised); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }

  /* ── REPL tab ── */
  .repl-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .repl-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .repl-cwd {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    flex: 1;
  }
  .repl-output {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.6;
    background: var(--bg);
  }
  .repl-line { display: flex; gap: 8px; }
  .repl-line.cmd  { color: var(--accent2); margin-top: 6px; }
  .repl-line.out  { color: var(--text); }
  .repl-line.err  { color: var(--warn); }
  .repl-line.info { color: var(--muted); font-style: italic; }
  .repl-prompt { color: var(--muted); }
  .repl-input-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  .repl-input-row input {
    flex: 1;
    background: var(--raised);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
    transition: border-color .15s;
  }
  .repl-input-row input:focus { border-color: var(--accent2); }

  .right-resizer {
    width: 5px;
    cursor: col-resize;
    background: var(--border);
    flex-shrink: 0;
    transition: background .12s;
    touch-action: none;
  }
  .right-resizer:hover,
  .right-resizer.dragging {
    background: var(--accent);
  }
  .right {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
    min-width: 320px;
  }
  .right-tabs {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    padding: 0 8px;
    overflow-x: auto;
  }
  .right-tab {
    padding: 7px 10px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .3px;
    color: var(--muted);
    border: none;
    border-bottom: 2px solid transparent;
    background: transparent;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .right-tab.active {
    color: var(--text);
    border-bottom-color: var(--accent);
  }
  .right-tab:hover:not(.active) { color: var(--text); }

  /* ── KAI panels ── */
  .kai-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .kai-head {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    flex-shrink: 0;
  }
  .kai-head .on { color: var(--accent2); }
  .kai-head .off { color: var(--warn); }
  .executor-inspector { flex:1;min-height:0;display:flex;flex-direction:column;background:var(--bg); }
  .executor-toolbar { display:flex;gap:7px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--border); }
  .executor-toolbar select { flex:1;min-width:0;background:var(--raised);color:var(--text);border:1px solid var(--border);border-radius:var(--radius);padding:5px 7px;font:11px var(--mono); }
  .executor-meta { padding:7px 10px;color:var(--muted);border-bottom:1px solid var(--border);font:10px/1.5 var(--mono); }
  .tree-nodes { flex:1;overflow:auto;padding:8px 0;font:11px/1.55 var(--mono); }
  .tree-row {
    display:flex;
    align-items:center;
    gap:7px;
    padding:2px 10px 2px 8px;
    white-space:nowrap;
    user-select:none;
  }
  .tree-row:hover { background:var(--raised); }
  .tree-row.branch { cursor:pointer; }
  .tree-row.collapsed .tree-label { opacity:.78; }
  .tree-toggle {
    width:12px;
    flex:0 0 12px;
    color:var(--accent);
    text-align:center;
    font-size:10px;
  }
  .tree-label { color:var(--text); }
  .tree-type { color:var(--muted); }
  .tree-count {
    margin-left:auto;
    color:var(--muted);
    font-size:10px;
    font-variant-numeric: tabular-nums;
  }
  .pi-op-bar {
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    padding:8px 10px;
    border-bottom:1px solid var(--border);
    background:var(--surface);
    flex-shrink:0;
  }
  .pi-op-bar .btn {
    padding:4px 8px;
    font-size:10px;
    line-height:1;
  }
  .debug-actions { display:flex;gap:6px;padding:8px 10px;border-bottom:1px solid var(--border); }
  .debug-workspace {
    flex:1;

    padding: 4px 8px;
    background: var(--raised);
    border: 1px solid var(--border);

  /* ── FILE VIEWER ── */
  .file-viewer {
    flex: 1;

</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useLayoutEffect, useRef, useCallback, useMemo, Fragment } = React;

// Prefer the server that delivered the UI. Retain direct file:// support for
// local use, where there is no page origin to target.
const API = window.location.protocol === 'file:'
  ? 'http://localhost:3001'
  : window.location.origin;
ace.config.set('basePath','https://cdnjs.cloudflare.com/ajax/libs/ace/1.36.5/');
const SID = sessionStorage.getItem('kai-workbench-sid') ||
  (crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`);
sessionStorage.setItem('kai-workbench-sid', SID);
const CHAT_MEMORY_KEY = 'kai-workbench-chat-memory-v1';
const CHAT_MEMORY_LIMIT = 100;
const CHAT_IMAGE_MAX_BYTES = 4 * 1024 * 1024;
const INITIAL_CHAT_MESSAGES = [{role:'assistant',content:'How can I help?'}];

function stableChatMessages(messages) {
  return (Array.isArray(messages) ? messages : [])
    .filter(message => message && !message.requestPending && ['user','assistant'].includes(message.role) && typeof message.content==='string')
    .slice(-CHAT_MEMORY_LIMIT)
    .map(({requestPending,startedAt,thinking,images,fullContent,...message}) => message);
}

function fileToChatImage(file) {
  return new Promise((resolve,reject) => {
    if(!file?.type?.startsWith('image/'))return resolve(null);
    if(file.size>CHAT_IMAGE_MAX_BYTES)return reject(new Error(`${file.name||'Image'} is larger than ${fmt(CHAT_IMAGE_MAX_BYTES)}`));
    const reader=new FileReader();
    reader.onload=()=>resolve({
      id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
      name: file.name || 'pasted-image',
      type: file.type || 'image/*',
      size: file.size || 0,
      src: reader.result,
      source: 'file',
    });
    reader.onerror=()=>reject(reader.error || new Error('Failed to read image'));
    reader.readAsDataURL(file);
  });
}

function imageUrlToChatImage(src) {
  const value=String(src||'').trim();
  if(!/^(data:image\/|https?:\/\/)/i.test(value))return null;
  const clean=value.split(/[?#]/)[0];
  const name=clean.split('/').pop() || 'dragged-image';
  return {
    id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`,
    name,
    type: value.startsWith('data:') ? (value.match(/^data:([^;,]+)/)?.[1] || 'image/*') : 'image/url',
    size: value.length,
    src:value,
    source:value.startsWith('data:')?'data-url':'url',
  };
}

function imageContext(image) {
  const header=`<image name="${image.name}" type="${image.type}" source="${image.source}" size="${image.size||0}">`;
  return image.source==='url'
    ? `${header}\n${image.src}\n</image>`
    : `${header}\n${image.src}\n</image>`;
}

function dragImageTransfer(event,image) {
  const dt=event.dataTransfer;
  if(!dt||!image?.src)return;
  dt.effectAllowed='copy';
  dt.setData('text/plain',image.src);
  dt.setData('text/uri-list',image.src);
  dt.setData('text/html',`<img src="${image.src.replace(/"/g,'&quot;')}" alt="${(image.name||'image').replace(/"/g,'&quot;')}">`);
  dt.setData('DownloadURL',`${image.type||'image/png'}:${image.name||'image'}:${image.src}`);
}

async function openChatImage(image) {
  const response=await fetch(`${API}/api/open/image`,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({sid:SID,src:image.src,name:image.name,type:image.type}),
  });
  const result=await response.json();
  if(!response.ok||result.error)throw new Error(result.error||`HTTP ${response.status}`);
  return result;
}

function loadChatMemory() {
  try {
    const saved=JSON.parse(localStorage.getItem(CHAT_MEMORY_KEY));
    const valid=stableChatMessages(saved);
    return valid.length ? valid : INITIAL_CHAT_MESSAGES;
  } catch {
    return INITIAL_CHAT_MESSAGES;
  }
}

function saveChatMemory(messages) {
  const stable=stableChatMessages(messages).filter(message => message.content);
  try { localStorage.setItem(CHAT_MEMORY_KEY,JSON.stringify(stable)); }
  catch(error) { console.error('Failed to save chat memory:',error); }
}

function chatErrorMessage(error) {
  if(/unable to allocate CUDA|failed to load model/i.test(error.message))
    return 'The selected model could not allocate enough GPU memory. Close other GPU-heavy apps, restart Ollama through ./s.ps1 so the low-memory settings apply, or choose a smaller model from the header; your conversation is saved.';
  if(/ECONNREFUSED.*127\.0\.0\.1:11434|fetch failed/i.test(error.message))
    return 'Ollama is not accepting connections at 127.0.0.1:11434. Start Ollama, or restart KaiWorkbench through ./s.ps1 so the local model service is available; your conversation is saved.';
  return error.name==='AbortError'?'Generation stopped.':`Error: ${error.message}`;
}

function formatMiB(value) {
  const mib=Number(value)||0;
  return mib>=1024 ? `${(mib/1024).toFixed(1)}G` : `${Math.round(mib)}M`;
}

function vramLabel(vram) {
  if(!vram?.available)return 'VRAM n/a';
  const total=vram.total||{};
  return `VRAM ${formatMiB(total.appUsedMiB)}`;
}

function vramTitle(vram) {
  if(!vram?.available)return vram?.error ? `VRAM unavailable: ${vram.error}` : 'VRAM unavailable';
  const total=vram.total||{};
  const gpu=(vram.gpus||[]).map(item =>
    `GPU ${item.index}: ${item.name} ${formatMiB(item.usedMiB)} / ${formatMiB(item.totalMiB)}`
  ).join('\n');
  return `${vram.appScope}\nApp: ${formatMiB(total.appUsedMiB)}\nOverall: ${formatMiB(total.usedMiB)} / ${formatMiB(total.totalMiB)}${gpu?`\n${gpu}`:''}`;
}

function ramLabel(ram) {
  if(!ram?.available)return 'RAM n/a';
  const total=ram.total||{};
  return `RAM ${formatMiB(total.appUsedMiB)}`;
}

function ramTitle(ram) {
  if(!ram?.available)return ram?.error ? `RAM unavailable: ${ram.error}` : 'RAM unavailable';
  const total=ram.total||{};
  return `System RAM\nApp: ${formatMiB(total.appUsedMiB)}\nOverall: ${formatMiB(total.usedMiB)} / ${formatMiB(total.totalMiB)}\nFree: ${formatMiB(total.freeMiB)}`;
}

function modelTitle(model){
  if(!model)return 'Model: checking';
  const install=model.installed?'Installed':`Not installed. Run: ollama pull ${model.id}`;
  return `${model.label||model.id} (${model.id})\n${install}\nVRAM: ${model.vram||'Unknown'}\nRAM: ${model.ram||'Unknown'}\n${model.fit||''}`;
}

function modelOptionLabel(model){
  const status=model.installed?'':'not installed';
  const memory=[model.vram,model.ram&&`RAM ${model.ram}`].filter(Boolean).join(', ');
  return [model.label||model.id,memory,status].filter(Boolean).join(' - ');
}

function parseToolCall(text) {
  const match = text.trim().match(/^TOOL:(bash|read_file|write_file|done)\s*\n([\s\S]*?)\nEND_TOOL\s*$/);
  if (!match) return null;
  const [, tool, body] = match;
  if (tool === 'bash') return { tool, cmd: (body.match(/^CMD:([\s\S]*)$/m)||[])[1]?.trim() };
  if (tool === 'read_file') return { tool, path: (body.match(/^PATH:([\s\S]*)$/m)||[])[1]?.trim() };
  if (tool === 'write_file') {
    const parsed = body.match(/^PATH:(.*?)\nCONTENT:\n?([\s\S]*)$/);
    return parsed ? { tool, path: parsed[1].trim(), content: parsed[2] } : null;
  }
  return { tool, summary: (body.match(/^SUMMARY:([\s\S]*)$/m)||[])[1]?.trim() || body.trim() };
}

// ── tiny markdown renderer ──────────────────────────────────────────────────
function renderMarkdown(text) {
  if (!text) return null;
  const lines = text.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    if (line.startsWith('```')) {
      const lang = line.slice(3).trim();
      const code = [];
      i++;
      while (i < lines.length && !lines[i].startsWith('```')) {
        code.push(lines[i]); i++;
      }
      out.push(<pre key={i}><code>{code.join('\n')}</code></pre>);
    } else if (line.startsWith('### ')) {
      out.push(<div key={i} className="md-h3">{inline(line.slice(4))}</div>);
    } else if (line.startsWith('## ')) {
      out.push(<div key={i} className="md-h2">{inline(line.slice(3))}</div>);
    } else if (line.startsWith('# ')) {
      out.push(<div key={i} className="md-h1">{inline(line.slice(2))}</div>);
    } else if (line.startsWith('> ')) {
      out.push(<div key={i} className="md-blockquote">{inline(line.slice(2))}</div>);
    } else if (line.startsWith('- ') || line.startsWith('* ')) {
      const items = [];
      while (i < lines.length && (lines[i].startsWith('- ') || lines[i].startsWith('* '))) {
        items.push(<li key={i} className="md-li">{inline(lines[i].slice(2))}</li>);
        i++;
      }
      out.push(<ul key={`ul${i}`} className="md-ul">{items}</ul>);
      continue;
    } else if (line.trim() === '---') {
      out.push(<hr key={i} className="md-hr"/>);
    } else if (line.trim() === '') {
      out.push(<br key={i}/>);
    } else {
      out.push(<div key={i} className="md-p">{inline(line)}</div>);
    }
    i++;
  }
  return out;
}

function inline(text) {
  const parts = text.split(/(`[^`]+`|\*\*[^*]+\*\*|\*[^*]+\*)/g);
  return parts.map((p, i) => {
    if (p.startsWith('**') && p.endsWith('**')) return <strong key={i}>{p.slice(2,-2)}</strong>;
    if (p.startsWith('*') && p.endsWith('*'))   return <em key={i}>{p.slice(1,-1)}</em>;
    if (p.startsWith('`') && p.endsWith('`'))   return <code key={i}>{p.slice(1,-1)}</code>;
    return p;
  });
}

// ── file size formatter ────────────────────────────────────────────────────
function fmt(bytes) {
  if (bytes == null) return '';
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + 'K';
  return (bytes/(1024*1024)).toFixed(1) + 'M';
}

// ── FileBrowser sidebar ────────────────────────────────────────────────────
function FileBrowser({ cwd, root, onInject, onOpenFile, onCwdChange }) {
  const [curPath, setCurPath] = useState('');
  const [entries, setEntries] = useState([]);
  const [selected, setSelected] = useState(null);
  const [err, setErr] = useState(null);
  const [showDotfiles, setShowDotfiles] = useState(false);

  const load = useCallback((p) => {
    setErr(null);
    fetch(`${API}/api/fs/list?path=${encodeURIComponent(p)}&sid=${encodeURIComponent(SID)}`)
      .then(r => r.json())
      .then(d => { if (d.error) { setErr(d.error); } else { setEntries(d.entries); setCurPath(d.path); } })
      .catch(e => setErr(e.message));
  }, []);

  useEffect(() => {
    setSelected(null);
    load('');
  }, [load, cwd]);

  const changeCwd = async (p) => {
    setErr(null);
    try {
      const r = await fetch(`${API}/api/session/cwd`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: p, sid: SID }),
      });
      const d = await r.json();
      if (!r.ok || d.error) throw new Error(d.error || `HTTP ${r.status}`);
      if (d.cwd) onCwdChange?.(d.cwd);
      setSelected(null);
      load('');
    } catch(e) {
      setErr(e.message);
    }
  };

  const handleClick = (e) => {
    if (e.type === 'dir') {
      changeCwd(curPath === '.' ? e.name : `${curPath}/${e.name}`);
    } else {
      const fp = curPath === '.' ? e.name : `${curPath}/${e.name}`;
      setSelected(fp);
      onOpenFile(fp);
    }
  };

  const goUp = () => {
    changeCwd('..');
  };

  const visibleEntries = showDotfiles
    ? entries
    : entries.filter((e) => !e.name.startsWith('.'));

  return (
    <div className="sidebar">
      <div className="sidebar-header" style={{justifyContent:'space-between'}}>
        <span>📁 Files</span>
        <button
          className="btn btn-ghost"
          style={{fontSize:10,padding:'4px 8px'}}
          onClick={() => setShowDotfiles(v => !v)}
        >
          {showDotfiles ? 'Hide dotfiles' : 'Show dotfiles'}
        </button>
      </div>
      <div className="sidebar-path" title={curPath}>~/{curPath}</div>
      {err && <div style={{padding:'8px 12px',color:'var(--warn)',fontSize:11}}>{err}</div>}
      <div className="sidebar-list">
        {cwd && root && cwd !== root && (
          <div className="sidebar-entry sidebar-back" onClick={goUp}>
            <span className="icon">↑</span>
            <span className="name">..</span>
          </div>
        )}
        {visibleEntries.map(e => (
          <div
            key={e.name}
            className={`sidebar-entry${selected === (curPath==='.'?e.name:`${curPath}/${e.name}`) ? ' selected' : ''}`}
            onClick={() => handleClick(e)}
            title={e.name}
          >
            <span className="icon">{e.type === 'dir' ? '📂' : '📄'}</span>
            <span className="name">{e.name}</span>
            {e.type === 'file' && <span className="size">{fmt(e.size)}</span>}
          </div>
        ))}
        {visibleEntries.length === 0 && !err && (
          <div style={{padding:'8px 12px',color:'var(--muted)',fontSize:11}}>Empty</div>
        )}
      </div>
      {selected && (
        <div style={{padding:'8px', borderTop:'1px solid var(--border)', display:'flex', gap:6}}>
          <button className="btn btn-ghost" style={{flex:1,fontSize:11,padding:'6px 8px'}}
            onClick={() => onInject(selected)}>
            ↗ Inject to chat
          </button>
        </div>
      )}
    </div>
  );
}

// ── REPL panel ─────────────────────────────────────────────────────────────
function ReplPanel({ cwd, onCwdChange }) {
  const [lines, setLines] = useState([{ type:'info', text:'Shell REPL — enter commands to run locally.' }]);
  const [input, setInput] = useState('');
  const [running, setRunning] = useState(false);
  const [history, setHistory] = useState([]);
  const [histIdx, setHistIdx] = useState(-1);
  const outputRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (outputRef.current) outputRef.current.scrollTop = outputRef.current.scrollHeight;
  }, [lines]);

  useEffect(() => {
    if (!running) inputRef.current?.focus();
  }, [running]);

  const run = async (cmd) => {
    if (!cmd.trim()) return;
    setHistory(h => [cmd, ...h.slice(0,49)]);
    setHistIdx(-1);
    setLines(l => [...l, { type:'cmd', text: cmd }]);
    setRunning(true);
    try {
      const r = await fetch(`${API}/api/tool/bash`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ cmd, sid: SID }),
      });
      const d = await r.json();
      if (d.stdout) d.stdout.split('\n').filter(Boolean).forEach(l => setLines(ls => [...ls, { type:'out', text: l }]));
      if (d.stderr) d.stderr.split('\n').filter(Boolean).forEach(l => setLines(ls => [...ls, { type:'err', text: l }]));
      setLines(ls => [...ls, { type:'info', text: `exit ${d.exitCode}` }]);
      if (d.cwd) {
        onCwdChange?.(d.cwd);
      }
    } catch(e) {
      setLines(ls => [...ls, { type:'err', text: e.message }]);
    }
    setRunning(false);
  };

  const onKey = (e) => {
    if (e.key === 'Enter') { run(input); setInput(''); }
    else if (e.key === 'ArrowUp') {
      const idx = Math.min(histIdx+1, history.length-1);
      setHistIdx(idx); setInput(history[idx] || '');
    } else if (e.key === 'ArrowDown') {
      const idx = Math.max(histIdx-1, -1);
      setHistIdx(idx); setInput(idx === -1 ? '' : history[idx]);
    }
  };

  return (
    <div className="repl-panel">
      <div className="repl-toolbar">
        <span style={{fontSize:13}}>⚡</span>
        <span className="repl-cwd">{cwd || '~'}</span>
        <button className="btn btn-ghost" style={{fontSize:11,padding:'4px 8px'}}
          onClick={() => setLines([{ type:'info', text:'Cleared.' }])}>
          Clear
        </button>
      </div>
      <div className="repl-output" ref={outputRef}>
        {lines.map((l, i) => (
          <div key={i} className={`repl-line ${l.type}`}>
            {l.type === 'cmd' && <span className="repl-prompt">$</span>}
            <span>{l.text}</span>
          </div>
        ))}
        {running && <div className="repl-line info"><span className="repl-prompt">▶</span><span>running…</span></div>}
      </div>
      <div className="repl-input-row">
        <span style={{color:'var(--accent2)',fontFamily:'var(--mono)',fontSize:13}}>$</span>
        <input
          ref={inputRef}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={onKey}
          placeholder="enter command…"
          disabled={running}
          autoFocus
        />
        <button className="btn btn-ghost" style={{fontSize:12,padding:'7px 12px'}}
          onClick={() => { run(input); setInput(''); }}
          disabled={running || !input.trim()}>
          Run
        </button>
      </div>
    </div>
  );
}

const ANSI_FG={
  30:'#555568',31:'#f06060',32:'#2dd4a0',33:'#f0c060',34:'#6aa9ff',35:'#c678dd',36:'#56d4dd',37:'#e0e0f0',
  90:'#777792',91:'#ff7777',92:'#55e6b3',93:'#ffd27a',94:'#88bbff',95:'#da8bec',96:'#79e5eb',97:'#ffffff'
};
const ANSI_BG={40:'#0a0a0d',41:'#5a2020',42:'#164a39',43:'#55451d',44:'#203858',45:'#482451',46:'#17484d',47:'#d0d0dc'};
const PI_TOKEN_STYLES={
  stack:{color:'#ffd27a',fontWeight:700},
  prompt:{color:'#56d4dd',fontWeight:700},
  string:{color:'#55e6b3'},
  number:{color:'#f0c060'},
  boolean:{color:'#da8bec'},
  operator:{color:'#88bbff'},
  null:{color:'#777792',fontStyle:'italic'}
};

function normalizeKaiIndices(text,mode){
  const sgr='(?:\\u001b\\[[0-9;]*m)*';
  const promptPattern=new RegExp(`\\[\\d+\\](?=${sgr}\\s+${sgr}[πρλ$])`);
  const stackLinePattern=/^((?:\u001b\[[0-9;]*m)*)\[(\d+)\]:?\s*(.*)$/;
  const stackVisiblePattern=/^\[\d+\]:?/;
  const lines=text.split('\n').map(line=>{
    if(promptPattern.test(line))line=line.replace(/\[\d+\]\s*/, '');
    return line;
  });
  if(mode!=='pi'){
    return lines.map(line=>{
      const visible=line.replace(/\u001b\[[0-9;]*m/g,'').trim();
      return visible==='π' ? '' : line;
    }).join('\n');
  }
  const output=[];
  let stackBlock=[];
  const rewriteStackLine=(line,index)=>{
    const match=line.match(stackLinePattern);
    if(!match)return line;
    const prefix=match[1]||'';
    const value=match[3]||'';
    return `${prefix}[${index}]:${value ? ` ${value}` : ''}`;
  };
  const flushStackBlock=()=>{
    if(!stackBlock.length)return;
    stackBlock.slice().reverse().forEach((line,i)=>{
      output.push(rewriteStackLine(line,stackBlock.length-1-i));
    });
    stackBlock=[];
  };
  for(const line of lines){
    const visible=line.replace(/\u001b\[[0-9;]*m/g,'').trim();
    if(visible==='π')continue;
    if(stackVisiblePattern.test(visible)){
      stackBlock.push(line);
      continue;
    }
    flushStackBlock();
    output.push(line);
  }
  flushStackBlock();
  return output.join('\n');
}

function piTokenStyle(token){
  if(/^\[\d+\]:?/.test(token))return PI_TOKEN_STYLES.stack;
  if(/^[πρλ$]$/.test(token))return PI_TOKEN_STYLES.prompt;
  if(/^"/.test(token))return PI_TOKEN_STYLES.string;
  if(/^(true|false)$/.test(token))return PI_TOKEN_STYLES.boolean;
  if(/^(nil|null)$/.test(token))return PI_TOKEN_STYLES.null;
  if(/^-?\d+(?:\.\d+)?$/.test(token))return PI_TOKEN_STYLES.number;
  if(/^[+\-*\/=<>!&|]+$/.test(token))return PI_TOKEN_STYLES.operator;
  return null;
}

function renderPiTokens(text,baseStyle,keyStart){
  const tokenPattern=/(\[\d+\]:?|[πρλ$](?=\s|$)|"(?:\\.|[^"\\])*"|\b(?:true|false|nil|null)\b|-?\d+(?:\.\d+)?|[+\-*\/=<>!&|]+)/g;
  const nodes=[];
  let offset=0,match,key=keyStart;
  while((match=tokenPattern.exec(text))){
    if(match.index>offset)nodes.push(<span key={key++} style={{...baseStyle}}>{text.slice(offset,match.index)}</span>);
    const token=match[0];
    nodes.push(<span key={key++} style={{...baseStyle,...piTokenStyle(token)}}>{token}</span>);
    offset=tokenPattern.lastIndex;
  }
  if(offset<text.length)nodes.push(<span key={key++} style={{...baseStyle}}>{text.slice(offset)}</span>);
  return {nodes,key};
}

function AnsiOutput({text,mode}){
  const source=normalizeKaiIndices(text.replace(/\u001b\[[0-?]*[ -/]*([@-~])/g,(seq,final)=>final==='m'?seq:''),mode);
  const parts=[];const pattern=/\u001b\[([0-9;]*)m/g;
  let style={},offset=0,match,key=0;
  const append=end=>{
    if(end<=offset)return;
    const chunk=source.slice(offset,end);
    if(mode==='pi'&&!style.color){
      const rendered=renderPiTokens(chunk,style,key);
      parts.push(...rendered.nodes);
      key=rendered.key;
    }else{
      parts.push(<span key={key++} style={{...style}}>{chunk}</span>);
    }
  };
  while((match=pattern.exec(source))){
    append(match.index);offset=pattern.lastIndex;
    const codes=(match[1]||'0').split(';').map(Number);
    for(const code of codes){
      if(code===0)style={};
      else if(code===1)style={...style,fontWeight:700};
      else if(code===2)style={...style,opacity:.65};
      else if(code===3)style={...style,fontStyle:'italic'};
      else if(code===4)style={...style,textDecoration:'underline'};
      else if(code===22){style={...style};delete style.fontWeight;delete style.opacity;}
      else if(code===23){style={...style};delete style.fontStyle;}
      else if(code===24){style={...style};delete style.textDecoration;}
      else if(code===39){style={...style};delete style.color;}
      else if(code===49){style={...style};delete style.backgroundColor;}
      else if(ANSI_FG[code])style={...style,color:ANSI_FG[code]};
      else if(ANSI_BG[code])style={...style,backgroundColor:ANSI_BG[code]};
    }
  }
  append(source.length);
  return <>{parts}</>;
}

function ExecutorSelect({executors,value,onChange}){
  return <select value={value} onChange={event=>onChange(event.target.value)} disabled={!executors.length}>
    {!executors.length&&<option value="">No Executors</option>}
    {executors.map(exec=><option key={exec.id} value={exec.id}>Executor #{exec.id}</option>)}
  </select>;
}

function buildTreeExplorer(nodes){
  const roots=[];
  const stack=[];
  for(const original of nodes||[]){
    const depth=Number.isFinite(original?.depth)?original.depth:0;
    const node={...original,depth,children:[]};
    while(stack.length&&stack[stack.length-1].depth>=depth)stack.pop();
    const parent=stack[stack.length-1];
    if(parent)parent.children.push(node);
    else roots.push(node);
    stack.push(node);
  }
  return roots;
}

function treeNodeSummary(node, exec){
  const pieces=[
    `Label: ${node?.label||'/'}`,
    `Type: ${node?.type||'unknown'}`,
    `Node: #${node?.id}`,
    `Depth: ${Number.isFinite(node?.depth)?node.depth:0}`,
    node?.path?`Path: ${node.path}`:'',
    node?.value?`Value: ${node.value}`:'',
    node?.text?`Text: ${node.text}`:'',
    node?.source?`Source: ${node.source}`:'',
    exec?.treeId?`Tree: ${exec.treeId}`:'',
    exec?.rootId?`Root: #${exec.rootId}`:'',
    exec?.scope?`Scope: ${exec.scope}`:exec?.scopeId?`Scope: #${exec.scopeId}`:'',
  ].filter(Boolean);
  if(/continuation/i.test(String(node?.type||node?.label||'')))pieces.push('Double-click to paste to Pi');
  return pieces.join('\n');
}

function getContinuationPasteText(node){
  return String(node?.text??node?.value??node?.source??node?.code??node?.expression??node?.label??node?.path??'').trim();
}

function isContinuationNode(node){
  return /continuation/i.test(String(node?.type||node?.label||node?.path||''));
}

function getNodeSourceText(node){
  return String(node?.source??node?.code??node?.text??node?.value??node?.expression??'').trim();
}

function collectContinuationTokens(node){
  const tokens=[];
  const visit=item=>{
    for(const child of item?.children||[]){
      const direct=getNodeSourceText(child);
      const token=direct||String(child?.label??'').trim();
      if(token&&token!=='/'&&(direct||!child?.children?.length))tokens.push(token);
      visit(child);
    }
  };
  visit(node);
  return tokens;
}

function getContinuationRhoText(node){
  const direct=getNodeSourceText(node);
  if(direct)return direct;
  const tokens=collectContinuationTokens(node);
  return tokens.length?`{${tokens.join(' ')} }`:'';
}

function getTreeObjectRhoText(node,exec){
  const continuation=getContinuationRhoText(node);
  if(isContinuationNode(node)&&continuation)return continuation;
  const lines=[
    `// Executor ${exec?.id??'unknown'} object ${node?.id??'unknown'}`,
    `// Type: ${node?.type||'unknown'}`,
    `// Path: ${node?.path||'/'}`,
    getNodeSourceText(node)
  ].filter(Boolean);
  return lines.join('\n');
}

const PI_STACK_OPS = [
  {word:'dup', title:'Duplicate the top stack item'},
  {word:'swap', title:'Swap the top two stack items'},
  {word:'drop', title:'Remove the top stack item'},
  {word:'rot', title:'Rotate the top three stack items'},
  {word:'roll', title:'Roll a deeper stack item to the top'},
  {word:'over', title:'Copy the second item to the top'},
  {word:'depth', title:'Push the current stack depth'},
];

function TreeInspector({snapshot,onRefresh,onPasteContinuation,onOpenObject}){
  const executors=snapshot?.executors||[];
  const [selected,setSelected]=useState('');
  const [collapsed,setCollapsed]=useState(()=>new Set());
  useEffect(()=>{if(!executors.some(exec=>exec.id===selected))setSelected(executors[0]?.id||'');},[snapshot,selected]);
  const exec=executors.find(item=>item.id===selected);
  const tree=useMemo(()=>buildTreeExplorer(exec?.nodes||[]),[exec]);
  useEffect(()=>{
    const next=new Set();
    const visit=(items,level=0)=>{
      for(const item of items){
        if(level>0&&item.children?.length)next.add(String(item.id));
        if(item.children?.length)visit(item.children,level+1);
      }
    };
    visit(tree);
    setCollapsed(next);
  },[tree]);
  const toggleNode=id=>setCollapsed(current=>{
    const next=new Set(current);
    if(next.has(id))next.delete(id);
    else next.add(id);
    return next;
  });
  const renderNode=(node,level=0)=>{
    const key=String(node.id);
    const hasChildren=Boolean(node.children?.length);
    const closed=collapsed.has(key);
    const branchClass=`tree-row${hasChildren?' branch':''}${closed?' collapsed':''}`;
    const pasteText=isContinuationNode(node)?getContinuationPasteText(node):'';
    return (
      <Fragment key={key}>
        <div
          className={branchClass}
          style={{paddingLeft:10+level*16}}
          title={treeNodeSummary(node,exec)}
          onClick={hasChildren?()=>toggleNode(key):undefined}
          onDoubleClick={event=>{
            event.stopPropagation();
            if(isContinuationNode(node)&&pasteText)onPasteContinuation?.(pasteText);
            onOpenObject?.(getTreeObjectRhoText(node,exec));
          }}
        >
          <span className="tree-toggle" aria-hidden="true">{hasChildren?(closed?'▸':'▾'):'•'}</span>
          <span className="tree-label">{node.label||'/'}</span>
          <span className="tree-type">{node.type} #{node.id}</span>
          {hasChildren&&<span className="tree-count">{node.children.length}</span>}
        </div>
        {hasChildren&&!closed&&node.children.map(child=>renderNode(child,level+1))}
      </Fragment>
    );
  };
  return <div className="executor-inspector">
    <div className="executor-toolbar"><ExecutorSelect executors={executors} value={selected} onChange={setSelected}/>
      <button className="btn bg" onClick={onRefresh}>Refresh</button></div>
    {exec&&<div className="executor-meta">Tree {exec.treeId||'none'} · root #{exec.rootId} · scope {exec.scope||'#'+exec.scopeId}</div>}
    <div className="tree-nodes">
      {!exec&&<div className="executor-meta">No live Executors.</div>}
      {exec&&exec.nodes.length===0&&<div className="executor-meta">This Executor has no Tree nodes.</div>}
      {tree.map(node=>renderNode(node))}
    </div>
  </div>;
}

function DebugStackList({items,empty,currentTop,onPasteContinuation}){

  return <div className="debug-stack-list">
    {items.map((item,i)=>{

      const type=String(item?.type??'');
      const handle=String(item?.handle??item?.id??'');
      const key=`${item?.index??i}-${handle}-${value}`;
      const pasteText=/continuation/i.test(type)?value:'';
      return <div
        key={key}
        className={`debug-stack-row${currentTop&&i===0?' current':''}`}
        title={pasteText?'Double-click to paste to Pi':undefined}

          {value||'(empty)'}

}

function DebugInspector({snapshot,onRefresh,onAction,output,onClearConsole,onPasteContinuation}){
  const executors=snapshot?.executors||[];

function KaiConsolePanel({view,rhoMirror,onMirrorChange,rhoDraft,onConsumeRhoDraft,piDraft,onConsumePiDraft,onPasteContinuation,onOpenTreeObject}){
  const title=view==='debugger'?'Debugger':view==='tree'?'Tree':view==='rho'?'Rho':'Pi';
  const prompt=view==='rho'?'ρ>':'π>';
  const [output,setOutput]=useState('');
  const [inp,setInp]=useState('');
  const [status,setStatus]=useState('connecting');
  const [hist,setHist]=useState([]);
  const [hi,setHi]=useState(-1);
  const [treeSnapshot,setTreeSnapshot]=useState(null);
  const wsRef=useRef(null);
  const outRef=useRef(null);
  const viewRef=useRef(view);
  viewRef.current=view;
  const clean=text=>text.replace(/\r/g,'');
  const send=value=>{if(wsRef.current?.readyState===WebSocket.OPEN)wsRef.current.send(JSON.stringify(value));};
  const requestId=()=>crypto.randomUUID?.()||`${Date.now()}-${Math.random().toString(36).slice(2)}`;
  const refreshExecutors=()=>send({type:'inspect_tree',id:requestId()});

  useEffect(()=>{
    const socket=new WebSocket(API.replace(/^http/,'ws')+'/api/kai?sid='+encodeURIComponent(SID));
    wsRef.current=socket;
    socket.onopen=()=>socket.send(JSON.stringify({type:'start',mode:'pi'}));
    socket.onmessage=event=>{
      const msg=JSON.parse(event.data);
      if(msg.type==='ready'){
        setStatus('connected');
        if(viewRef.current==='rho')socket.send(JSON.stringify({type:'input',data:'rho'}));
        if(viewRef.current==='tree'||viewRef.current==='debugger')socket.send(JSON.stringify({type:'inspect_tree',id:requestId()}));
      }
      else if(msg.type==='stdout'||msg.type==='stderr')setOutput(text=>(text+clean(String(msg.data))).slice(-100000));
      else if(msg.type==='tree'){
        if(msg.data?.ok)setTreeSnapshot(msg.data);
        else setOutput(text=>text+'\nTree error: '+(msg.data?.error||'request failed')+'\n');
      }
      else if(msg.type==='debug'){
        const result=msg.data||{};
        const text=result.ok?`${result.message||''}${result.stack?'\n'+result.stack:''}\n`:`Debug error: ${result.error||'request failed'}\n`;
        setOutput(output=>(output+text).slice(-100000));
        if(result.ok)refreshExecutors();
      }
      else if(msg.type==='error'){setStatus('error');setOutput(text=>text+'\nError: '+msg.data+'\n');}
      else if(msg.type==='exit'){setStatus('exited');setOutput(text=>text+`\n[CppKAI exited ${msg.data}]\n`);}
    };
    socket.onerror=()=>setStatus('error');
    socket.onclose=()=>setStatus(s=>s==='exited'?s:'closed');
    return()=>{socket.close();wsRef.current=null;};
  },[]);

  useEffect(()=>{
    if(status!=='connected')return;
    if(view==='pi'||view==='rho')send({type:'input',data:view});
    else refreshExecutors();
  },[view,status]);

  useEffect(()=>{if(outRef.current)outRef.current.scrollTop=outRef.current.scrollHeight;},[output]);

  const run=command=>{
    if(!command.trim()||wsRef.current?.readyState!==WebSocket.OPEN)return;
    wsRef.current.send(JSON.stringify({type:'input',data:command}));
    setHist(h=>[command,...h.slice(0,199)]);
    setHi(-1);
    setInp('');
  };
  const debugAction=(executorId,action)=>{
    send({type:'debug_action',id:requestId(),executorId,action});
  };
  const onKey=event=>{
    if(event.key==='Enter')run(inp);
    else if(event.key==='ArrowUp'){event.preventDefault();const i=Math.min(hi+1,hist.length-1);setHi(i);setInp(hist[i]||'');}
    else if(event.key==='ArrowDown'){event.preventDefault();const i=Math.max(hi-1,-1);setHi(i);setInp(i<0?'':hist[i]);}
  };
  useEffect(()=>{
    if(view!=='pi'||!piDraft)return;
    setInp(piDraft);
    setHi(-1);
    onConsumePiDraft?.();
  },[view,piDraft,onConsumePiDraft]);
  useEffect(()=>{
    if(view!=='rho'||!rhoDraft)return;
    setInp(rhoDraft);
    setHi(-1);
    onMirrorChange?.(rhoDraft);
    onConsumeRhoDraft?.();
  },[view,rhoDraft,onMirrorChange,onConsumeRhoDraft]);

  return(
    <div className="kai-panel">
      <div className="kai-head">
        <strong style={{color:'var(--accent)'}}>CppKAI {title}</strong><span style={{flex:1}}>Ext/CppKAI</span>
        {(view==='tree'||view==='debugger')&&<button className="btn bg" style={{fontSize:10,padding:'3px 7px'}} onClick={refreshExecutors}>Refresh</button>}
        <button className="btn bg" style={{fontSize:10,padding:'3px 7px'}} onClick={()=>setOutput('')}>Clear</button>
        <span className={status==='connected'?'on':'off'}>{status}</span>
      </div>
      {view==='tree' ? <TreeInspector snapshot={treeSnapshot} onRefresh={refreshExecutors} onPasteContinuation={onPasteContinuation} onOpenObject={onOpenTreeObject}/>
      : view==='debugger' ? <DebugInspector snapshot={treeSnapshot} onRefresh={refreshExecutors} onAction={debugAction} output={output} onClearConsole={()=>setOutput('')} onPasteContinuation={onPasteContinuation}/>
      : view==='rho' ? (
        <RhoEditorPanel
          value={inp}
          onChange={value=>{setInp(value); onMirrorChange?.(value);}}
          onRun={run}
          status={status}
          mirrorText={rhoMirror}
        />
      ) : (
        <>
          {view==='pi' && rhoMirror && (
            <div style={{padding:'7px 10px',borderBottom:'1px solid var(--border)',background:'var(--bg)',fontSize:10,fontFamily:'var(--mono)',color:'var(--muted)',whiteSpace:'pre-wrap',maxHeight:140,overflow:'auto'}}>
              <div style={{color:'var(--accent)',marginBottom:4}}>Rho mirror</div>
              {rhoMirror}
            </div>
          )}
          {view==='pi' && (
            <div className="pi-op-bar">
              {PI_STACK_OPS.map(op=>(
                <button key={op.word} className="btn bg" title={op.title} onClick={()=>run(op.word)}>
                  {op.word}
                </button>
              ))}
            </div>
          )}
          <div className="kai-out" ref={outRef}><AnsiOutput text={output||`Starting CppKAI ${title}…\n`} mode={view}/></div>
        <div className="kai-input">
          <span style={{color:'var(--accent)',fontFamily:'var(--mono)'}}>{prompt}</span>
          <input value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={onKey} disabled={status!=='connected'} placeholder="2 3 +"/>
        </div>
        </>
      )}
    </div>
  );
}

function aceMode(filePath) {
  const ext=(filePath.split('.').pop()||'').toLowerCase();
  const modes={
    c:'c_cpp',cc:'c_cpp',cpp:'c_cpp',cxx:'c_cpp',h:'c_cpp',hh:'c_cpp',hpp:'c_cpp',
    js:'javascript',jsx:'javascript',mjs:'javascript',ts:'typescript',tsx:'typescript',
    py:'python',rb:'ruby',rs:'rust',go:'golang',java:'java',sh:'sh',bash:'sh',zsh:'sh',
    html:'html',htm:'html',css:'css',scss:'scss',json:'json',yaml:'yaml',yml:'yaml',
    md:'markdown',xml:'xml',sql:'sql',cmake:'cmake',dockerfile:'dockerfile'
  };
  const name=filePath.split('/').pop().toLowerCase();
  if(name==='makefile')return 'makefile';
  if(name==='dockerfile')return 'dockerfile';
  return modes[ext]||'text';
}

function getAceVimApi() {
  try {
    return ace.require('ace/keyboard/vim')?.CodeMirror?.Vim || null;
  } catch {

  }
}

function installAceVimExCommands() {
  const Vim = getAceVimApi();
  if (!Vim || Vim.__kaiworkbenchExCommandsInstalled) return Vim;

  const define = (name, handler) => {
    if (typeof Vim.defineEx === 'function') {
      Vim.defineEx(name, name, handler);
    }
  };

  const splitExArgs = (text, delimiter, limit) => {
    const parts = [];
    let chunk = '';
    let escape = false;
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (escape) {
        chunk += ch;
        escape = false;
        continue;
      }
      if (ch === '\\') {
        chunk += ch;
        escape = true;
        continue;
      }
      if (ch === delimiter && parts.length < limit - 1) {
        parts.push(chunk);
        chunk = '';
        continue;
      }
      chunk += ch;
    }
    parts.push(chunk);
    return parts;
  };

  const parseSubstitute = input => {
    const text = String(input || '').trim();
    const range = text.startsWith('%') ? '%' : '';
    const spec = range ? text.slice(1).trimStart() : text;
    if (!spec.startsWith('s') || spec.length < 2) return null;
    const delimiter = spec[1];
    if (!delimiter || /\s/.test(delimiter)) return null;
    const parts = splitExArgs(spec.slice(2), delimiter, 3);
    if (parts.length < 3) return null;
    return {
      range,
      pattern: parts[0],
      replacement: parts[1],
      flags: parts[2].trim(),
    };
  };

  const applySubstitute = (editor, input) => {
    const spec = parseSubstitute(input);
    if (!spec) return Promise.resolve();
    const source = String(editor?.getValue?.() || '');
    const lines = source.split('\n');
    const cursorRow = Math.max(0, editor?.getCursorPosition?.()?.row || 0);
    const targetRows = spec.range === '%'
      ? lines.map((_, index) => index)
      : [Math.min(cursorRow, Math.max(0, lines.length - 1))];
    let regex;
    try {
      regex = new RegExp(spec.pattern, spec.flags.includes('i') ? 'gi' : 'g');
    } catch {
      return Promise.resolve();
    }
    const useGlobal = spec.flags.includes('g');
    let changed = false;
    for (const row of targetRows) {
      const before = lines[row] || '';
      const after = useGlobal ? before.replace(regex, spec.replacement) : before.replace(regex, spec.replacement);
      if (after !== before) {
        lines[row] = after;
        changed = true;
      }
    }
    if (changed) editor?.setValue?.(lines.join('\n'), -1);
    return Promise.resolve();
  };

  const run = (cm, action, input) => {
    const editor = cm?._kaiworkbenchEditor || cm?.editor || cm;
    const ex = editor?._kaiworkbenchExActions || {};
    const invoke = fn => (typeof fn === 'function' ? Promise.resolve(fn(editor, input)) : Promise.resolve());
    const close = () => invoke(ex.close);
    const save = () => invoke(ex.save);

    switch (action) {
      case 'write':
        return save();
      case 'wq':
        return save().then(() => close());
      case 'x':
        return (typeof ex.isDirty === 'function' && ex.isDirty(editor, input) ? save() : Promise.resolve()).then(() => close());
      case 'quit':
      case 'close':
      case 'q!':
        return close();
      case 'substitute':
        return applySubstitute(editor, input);
      default:
        return Promise.resolve();
    }
  };

  define('q', (cm, input) => run(cm, 'quit', input));
  define('q!', (cm, input) => run(cm, 'q!', input));
  define('w', (cm, input) => run(cm, 'write', input));
  define('write', (cm, input) => run(cm, 'write', input));
  define('wq', (cm, input) => run(cm, 'wq', input));
  define('x', (cm, input) => run(cm, 'x', input));
  define('s', (cm, input) => run(cm, 'substitute', input));
  define('substitute', (cm, input) => run(cm, 'substitute', input));

  Vim.__kaiworkbenchExCommandsInstalled = true;
  return Vim;
}

function bindAceVimExActions(editor, actions) {
  if (!editor) return;
  installAceVimExCommands();
  editor._kaiworkbenchEditor = editor;
  editor._kaiworkbenchExActions = actions || {};
}

function FileViewerPanel({ filePath, onClose }) {
  const [content, setContent] = useState(null);
  const [err, setErr] = useState(null);
  const [loading, setLoading] = useState(false);
  const [dirty, setDirty] = useState(false);
  const [saving, setSaving] = useState(false);
  const [notice, setNotice] = useState('');
  const editorEl = useRef(null);
  const aceRef = useRef(null);
  const suppressChange = useRef(false);
  const saveRef = useRef(null);

  useEffect(() => {
    if (!filePath) { setContent(null); setErr(null); return; }
    setLoading(true); setErr(null); setContent(null); setDirty(false); setNotice('');
    fetch(`${API}/api/fs/read?path=${encodeURIComponent(filePath)}&sid=${encodeURIComponent(SID)}`)
      .then(r => r.json())
      .then(d => { if (d.error) setErr(d.error); else setContent(d.content); })
      .catch(e => setErr(e.message))
      .finally(() => setLoading(false));
  }, [filePath]);

  const save = async () => {
    if (!filePath || !aceRef.current || saving) return;
    setSaving(true); setErr(null); setNotice('');
    try {
      const response=await fetch(`${API}/api/fs/write`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({path:filePath,content:aceRef.current.getValue(),sid:SID})
      });
      const result=await response.json();
      if(!response.ok||result.error)throw new Error(result.error||`HTTP ${response.status}`);
      setDirty(false); setNotice('Saved');
    } catch(e) { setErr(e.message); }
    setSaving(false);
  };
  saveRef.current=save;

  useEffect(() => {
    if(content==null||!editorEl.current)return;
    let editor=aceRef.current;
    if(!editor){
      editor=ace.edit(editorEl.current);
      aceRef.current=editor;
      editor.setTheme('ace/theme/monokai');
      editor.setKeyboardHandler('ace/keyboard/vim');
      editor.setOptions({fontSize:'13px',showPrintMargin:false,useWorker:false});
      editor.session.on('change',()=>{if(!suppressChange.current){setDirty(true);setNotice('');}});
      editor.commands.addCommand({name:'saveFile',bindKey:{win:'Ctrl-S',mac:'Command-S'},exec:()=>saveRef.current?.()});
    }
    bindAceVimExActions(editor,{
      save:()=>saveRef.current?.(),
      close:()=>onClose(),
      isDirty:()=>dirty,
    });
    suppressChange.current=true;
    editor.session.setMode(`ace/mode/${aceMode(filePath)}`);
    editor.setValue(content,-1);
    editor.clearSelection();
    suppressChange.current=false;
    editor.resize();
  },[content,filePath]);

  useEffect(() => () => { aceRef.current?.destroy(); aceRef.current=null; }, []);

  if (!filePath) return (
    <div className="file-viewer-empty">
      <span className="big">📂</span>
      <span>Select a file to view</span>
    </div>
  );

  return (
    <div className="file-viewer">
      <div className="file-viewer-header">
        <span>📄</span>
        <span style={{flex:1, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>{filePath}</span>
        {dirty && <span style={{color:'var(--warn)'}}>Modified</span>}
        {notice && <span style={{color:'var(--accent2)'}}>{notice}</span>}
        <span style={{fontSize:10}}>Vim · {aceMode(filePath)}</span>
        <button className="btn btn-primary" style={{fontSize:11,padding:'4px 10px'}}
          onClick={save} disabled={saving||!dirty}>{saving?'Saving…':'Save'}</button>
        <button className="btn btn-ghost" style={{fontSize:11,padding:'4px 10px'}}
          onClick={onClose}>Close</button>
      </div>
      {loading && <div className="file-viewer-empty"><span>Loading…</span></div>}
      {err && <div style={{padding:'6px 16px',color:'var(--warn)',background:'var(--surface)',fontSize:11}}>{err}</div>}
      <div ref={editorEl} className="file-viewer-content" style={{display:content==null?'none':'block'}}/>
    </div>
  );
}

function RequestProgress({ startedAt, delaySeconds }) {
  const [elapsedMs, setElapsedMs] = useState(() => Date.now() - startedAt);

  useEffect(() => {
    const tick = () => setElapsedMs(Date.now() - startedAt);
    tick();
    const timer = setInterval(tick, 100);
    return () => clearInterval(timer);
  }, [startedAt]);

  if (elapsedMs < delaySeconds * 1000) return null;
  return (
    <div className="request-progress" role="status" aria-live="polite">
      <span className="request-spinner" aria-hidden="true"/>
      <span className="request-progress-track" aria-hidden="true">
        <span className="request-progress-bar"/>
      </span>
      <span>{(elapsedMs / 1000).toFixed(1)}s</span>
    </div>
  );
}

function MemoryFactsEditor({open,initialFacts=[],onClose,onSaved}) {
  const [text,setText] = useState('');
  const [loading,setLoading] = useState(false);
  const [saving,setSaving] = useState(false);
  const [error,setError] = useState('');
  const [notice,setNotice] = useState('');
  const editorEl = useRef(null);
  const aceRef = useRef(null);
  const suppressChange = useRef(false);
  const saveRef = useRef(null);

  const factsFromText = value => String(value||'')
    .split('\n')
    .map(line => line.replace(/^\s*(?:[-*]\s+|\d+[.)]\s+)/,'').trim())
    .filter(Boolean);

  useEffect(() => {
    if(!open)return;
    const fallbackFacts=Array.isArray(initialFacts) ? initialFacts : [];
    setText(fallbackFacts.join('\n'));
    setLoading(true); setSaving(false); setError(''); setNotice('');
    fetch(`${API}/api/memory?sid=${encodeURIComponent(SID)}`)
      .then(response => response.ok ? response.json() : Promise.reject(new Error(`HTTP ${response.status}`)))
      .then(data => {
        const loaded=Array.isArray(data.memory) ? data.memory : [];
        setText(loaded.length ? loaded.join('\n') : fallbackFacts.join('\n'));
        onSaved?.(loaded.length ? loaded : fallbackFacts);
      })
      .catch(error => setError(error.message))
      .finally(() => setLoading(false));
  }, [open]);

  const save = async () => {
    if(saving)return;
    const editor=aceRef.current;
    const memory=factsFromText(editor ? editor.getValue() : text);
    setSaving(true); setError(''); setNotice('');
    try{
      const response=await fetch(`${API}/api/memory`,{
        method:'PUT',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sid:SID,memory}),
      });
      const result=await response.json();
      if(!response.ok||result.error)throw new Error(result.error||`HTTP ${response.status}`);
      const saved=Array.isArray(result.memory) ? result.memory : [];
      const nextText=saved.join('\n');
      setText(nextText); setNotice('Saved'); onSaved?.(saved);
      if(editor&&editor.getValue()!==nextText){
        suppressChange.current=true;
        editor.setValue(nextText,-1);
        editor.clearSelection();
        suppressChange.current=false;
      }
    }catch(error){
      setError(error.message);
    }finally{
      setSaving(false);
    }
  };
  saveRef.current=save;

  useLayoutEffect(() => {
    if(!open){
      aceRef.current?.destroy();
      aceRef.current=null;
      return;
    }
    if(!editorEl.current)return;
    let editor=aceRef.current;
    if(editor&&editor.container!==editorEl.current){
      editor.destroy();
      aceRef.current=null;
      editor=null;
    }
    if(!editor){
      editor=ace.edit(editorEl.current);
      aceRef.current=editor;
      editor.setTheme('ace/theme/monokai');
      editor.setKeyboardHandler('ace/keyboard/vim');
      editor.setOptions({fontSize:'13px',showPrintMargin:false,useWorker:false});
      editor.session.setMode('ace/mode/text');
      editor.session.on('change',()=>{if(!suppressChange.current){setText(editor.getValue());setNotice('');}});
      editor.commands.addCommand({name:'saveMemoryFacts',bindKey:{win:'Ctrl-S',mac:'Command-S'},exec:()=>saveRef.current?.()});
    }
    bindAceVimExActions(editor,{
      save:()=>saveRef.current?.(),
      close:()=>onClose(),
      isDirty:()=>editor?.getValue()!==text,
    });
    if(editor.getValue()!==text){
      suppressChange.current=true;
      editor.setValue(text,-1);
      editor.clearSelection();
      suppressChange.current=false;
    }
    editor.setOptions({readOnly:saving});
    requestAnimationFrame(()=>{
      editor.resize(true);
      editor.renderer.updateFull();
      editor.focus();
    });
  }, [open,loading,text,saving]);

  useEffect(() => () => { aceRef.current?.destroy(); aceRef.current=null; }, []);

  if(!open)return null;
  const count=factsFromText(text).length;
  return (
    <div className="memory-editor-backdrop" role="dialog" aria-modal="true" aria-label="Stored facts editor">
      <div className="memory-editor">
        <div className="memory-editor-head">
          <strong>Stored Facts</strong>
          <span>Vim · one fact per line</span>
          <span style={{flex:1}}>{count} fact{count===1?'':'s'}</span>
          {error && <span className="memory-editor-status" style={{color:'var(--warn)'}}>{error}</span>}
          {notice && <span className="memory-editor-status" style={{color:'var(--accent2)'}}>{notice}</span>}
          <button className="btn btn-primary" style={{fontSize:11,padding:'4px 10px'}}
            onClick={save} disabled={loading||saving}>{saving?'Saving...':'Save'}</button>
          <button className="btn btn-ghost" style={{fontSize:11,padding:'4px 10px'}}
            onClick={onClose} disabled={saving}>Close</button>
        </div>
        <div className="memory-editor-body">
          <div ref={editorEl} className="memory-editor-ace"/>
        </div>
      </div>
    </div>
  );
}

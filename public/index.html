      onClearInject();
    }
  }, [injectedFile]);

  useEffect(() => {
    messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  }, [messages]);

  // auto-grow textarea
  useEffect(() => {
    if (taRef.current) {
      taRef.current.style.height = 'auto';
      taRef.current.style.height = Math.min(taRef.current.scrollHeight, 180) + 'px';
    }
  }, [input]);

  const focusChatInput = useCallback(() => {
    requestAnimationFrame(() => taRef.current?.focus());
  }, []);

  useEffect(() => {
    const busy = streaming || Boolean(pendingAction);
    if (wasChatBusyRef.current && !busy) focusChatInput();
    wasChatBusyRef.current = busy;
  }, [streaming, pendingAction, focusChatInput]);

  const updateMessage = (id, patch) => setMessages(current => current.map(
    message => message.id === id ? {...message,...patch} : message
  ));

  const toolResult = (tool, result) =>
    `TOOL_RESULT:${tool}\n${typeof result === 'string' ? result : JSON.stringify(result, null, 2)}\nEND_TOOL_RESULT`;

  const streamAssistant = async (history) => {
    const id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`;
    const startedAt=Date.now();
    setMessages(current => [...current, {id,role:'assistant',content:'',thinking:'',startedAt,requestPending:true}]);
    const controller=new AbortController();
    abortRef.current=controller;
    try{
      const res = await fetch(`${API}/api/chat`, {
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:history,sid:SID,rag:ragMode}),
        signal:controller.signal,
      });
      if(!res.ok)throw new Error((await res.json()).error||`HTTP ${res.status}`);
      loadMemoryFacts();

      const reader=res.body.getReader();
      const dec=new TextDecoder();
      let buf='',content='',thinking='',sawAssistantDelta=false;
      while(true){
        const {done,value}=await reader.read();
        if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop();
        for(const line of lines){
          if(!line.startsWith('data: '))continue;
          const raw=line.slice(6).trim();
          if(!raw||raw==='[DONE]')continue;
          const obj=JSON.parse(raw);
          if(obj.error)throw new Error(obj.error);
          const delta=obj.choices?.[0]?.delta;
          if(!delta)continue;
          content+=delta.content||'';
          thinking+=delta.reasoning_content||'';
          sawAssistantDelta=sawAssistantDelta||Boolean(delta.content||delta.reasoning_content);
          updateMessage(id,{content,thinking});
        }
      }
      if(!sawAssistantDelta)throw new Error('Model stream ended without assistant content');
      return {id,content};
    }catch(error){
      error.requestMessageId=id;
      throw error;
    }finally{
      updateMessage(id,{requestPending:false});
      if(abortRef.current===controller)abortRef.current=null;
    }
  };

  const runAgent = async (history, step=0) => {
    if(step>=8){
      setMessages(current=>[...current,{role:'assistant',content:'Stopped after 8 tool steps. Refine the request to continue.'}]);
      setStreaming(false);return;
    }
    try{
      const assistant=await streamAssistant(history);
      const call=parseToolCall(assistant.content);
      if(!call){
        setStreaming(false);return;
      }
      if(call.tool==='done'){
        updateMessage(assistant.id,{content:call.summary||'Done.'});
        setStreaming(false);return;
      }
      const nextHistory=[...history,{role:'assistant',content:assistant.content}];

      if(call.tool==='write_file'){
        if(!call.path)throw new Error('Model requested write_file without a path');
        const response=await fetch(`${API}/api/tool/write_file/diff`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({...call,sid:SID}),
        });
        const proposal=await response.json();
        if(!response.ok||proposal.error)throw new Error(proposal.error||`HTTP ${response.status}`);
        updateMessage(assistant.id,{toolCall:call,proposal,status:'approval required'});
        setPendingAction({call,history:nextHistory,step:step+1,messageId:assistant.id});
        setStreaming(false);return;
      }

      if(call.tool==='bash'){
        if(!call.cmd)throw new Error('Model requested bash without a command');
        updateMessage(assistant.id,{toolCall:call,status:'approval required'});
        setPendingAction({call,history:nextHistory,step:step+1,messageId:assistant.id});
        setStreaming(false);return;
      }

      let result;
      if(call.tool==='read_file'){
        if(!call.path)throw new Error('Model requested read_file without a path');
        const response=await fetch(`${API}/api/tool/read_file`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({path:call.path,sid:SID}),
        });
        result=await response.json();
        if(!response.ok||result.error)throw new Error(result.error||`HTTP ${response.status}`);
      }else{
        throw new Error(`Unsupported tool: ${call.tool}`);
      }
      const shown=JSON.stringify(result,null,2).slice(0,12000);
      const resultMessage=toolResult(call.tool,shown);
      updateMessage(assistant.id,{toolCall:call,toolResult:shown,resultMessage,status:'completed'});
      await runAgent([...nextHistory,{role:'user',content:resultMessage}],step+1);
    }catch(error){
      const content=chatErrorMessage(error);
      if(error.requestMessageId)updateMessage(error.requestMessageId,{content});
      else setMessages(current=>[...current,{role:'assistant',content}]);
      abortRef.current=null;
      setStreaming(false);
    }
  };

  const resolveAction = async (approved) => {
    const pending=pendingAction;
    if(!pending)return;
    setPendingAction(null);setStreaming(true);
    let result=`${pending.call.tool} rejected by user.`;
    try{
      if(approved){
        const endpoint=pending.call.tool==='bash'?'/api/tool/bash':'/api/tool/write_file/confirm';
        const response=await fetch(`${API}${endpoint}`,{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({...pending.call,sid:SID}),
        });
        const body=await response.json();
        if(!response.ok||body.error)throw new Error(body.error||`HTTP ${response.status}`);
        if(body.cwd)onCwdChange?.(body.cwd);
        result=JSON.stringify(body,null,2);
      }
      const resultMessage=toolResult(pending.call.tool,result);
      updateMessage(pending.messageId,{status:approved?'approved':'rejected',toolResult:result,resultMessage});
      if(pending.resume===false){
        setStreaming(false);return;
      }
      await runAgent([...pending.history,{role:'user',content:resultMessage}],pending.step);
    }catch(error){
      updateMessage(pending.messageId,{status:'failed',toolResult:error.message});
      setStreaming(false);
    }
  };

  const send = async () => {
    if (!input.trim() && attachedFiles.length === 0 && attachedImages.length === 0) return;
    if (streaming || pendingAction) return;

    // build context from attached files
    let context = '';
    for (const fp of attachedFiles) {
      try {
        const r = await fetch(`${API}/api/fs/read?path=${encodeURIComponent(fp)}&sid=${encodeURIComponent(SID)}`);
        const d = await r.json();
        if (d.content) {
          context += `\n\n<file path="${fp}">\n${d.content.slice(0, 8000)}\n</file>`;
        }
      } catch (err) {
        console.error('Failed to read file context:', err);
      }
    }

    if(attachedImages.length){
      context += attachedImages.map(image=>`\n\n${imageContext(image)}`).join('');
    }

    const userContent = context ? `${input}\n${context}` : input;
    const displayMsg = {
      role: 'user',
      content: input,
      fullContent: userContent,
      files: [...attachedFiles],
      images: [...attachedImages]
    };

    setMessages(m => [...m, displayMsg]);
    setInput('');
    setChatHistoryIndex(-1);
    chatDraftRef.current='';
    setAttachedFiles([]);
    setAttachedImages([]);

    const directCd=/^cd(?:\s.*)?$/.test(input.trim());
    if(directCd&&!context){
      const call={tool:'bash',cmd:input.trim()};
      const content=`TOOL:bash\nCMD:${call.cmd}\nEND_TOOL`;
      const id=crypto.randomUUID?crypto.randomUUID():`${Date.now()}-${Math.random()}`;
      setMessages(current=>[...current,{id,role:'assistant',content,toolCall:call,status:'approval required'}]);
      setPendingAction({call,history:[],step:0,messageId:id,resume:false});
      return;
    }

    // build API messages using history fullContent for correct context
    const apiMessages = [
      ...messages.filter(m=>m.role!=='system').flatMap(m=>[
        {role:m.role,content:m.role==='user'?(m.fullContent||m.content):m.content},
        ...(m.resultMessage?[{role:'user',content:m.resultMessage}]:[]),
      ]),
      { role: 'user', content: userContent }
    ];

    setStreaming(true);
    await runAgent(apiMessages);
  };

  const userInputHistory = messages
    .filter(message=>message.role==='user'&&typeof message.content==='string'&&message.content.trim())
    .map(message=>message.content)
    .reverse();
  const moveCaretToEnd = () => requestAnimationFrame(()=>{
    const textarea=taRef.current;
    if(textarea)textarea.setSelectionRange(textarea.value.length,textarea.value.length);
  });
  const recallChatInput = (direction,event) => {
    const textarea=event.currentTarget;
    const atStart=textarea.selectionStart===0&&textarea.selectionEnd===0;
    const atEnd=textarea.selectionStart===textarea.value.length&&textarea.selectionEnd===textarea.value.length;
    if(direction<0&&!atStart)return false;
    if(direction>0&&!atEnd)return false;
    if(userInputHistory.length===0)return false;
    event.preventDefault();
    if(chatHistoryIndex===-1)chatDraftRef.current=input;
    const nextIndex=direction<0
      ? Math.min(chatHistoryIndex+1,userInputHistory.length-1)
      : chatHistoryIndex-1;
    setChatHistoryIndex(nextIndex);
    setInput(nextIndex<0?chatDraftRef.current:userInputHistory[nextIndex]);
    moveCaretToEnd();
    return true;
  };
  const onInputChange = event => {
    setInput(event.target.value);
    if(chatHistoryIndex!==-1)setChatHistoryIndex(-1);
  };
  const onKeyDown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    } else if(e.key==='ArrowUp') {
      recallChatInput(-1,e);
    } else if(e.key==='ArrowDown') {
      recallChatInput(1,e);
    }
  };

  const addDroppedImages = useCallback(async dataTransfer => {
    const files=[...dataTransfer.files].filter(file=>file.type.startsWith('image/'));
    const images=(await Promise.all(files.map(fileToChatImage))).filter(Boolean);
    const urlText=dataTransfer.getData('text/uri-list') || dataTransfer.getData('text/plain');
    const html=dataTransfer.getData('text/html');
    const htmlSrc=(html.match(/<img[^>]+src=["']([^"']+)["']/i)||[])[1];
    const urlImage=imageUrlToChatImage(htmlSrc || urlText.split('\n').find(line=>!line.startsWith('#')));
    if(urlImage && !images.some(image=>image.src===urlImage.src))images.push(urlImage);
    if(!images.length)return false;
    setAttachedImages(current=>{
      const seen=new Set(current.map(image=>image.src));
      return [...current,...images.filter(image=>!seen.has(image.src))];
    });
    focusChatInput();
    return true;
  }, [focusChatInput]);

  const onChatDragOver = event => {
    if(streaming||pendingAction)return;
    const hasImage=[...event.dataTransfer.items].some(item=>
      item.kind==='file' ? item.type.startsWith('image/') : ['text/uri-list','text/html','text/plain'].includes(item.type)
    );
    if(!hasImage)return;
    event.preventDefault();
    event.dataTransfer.dropEffect='copy';
    setDragActive(true);
  };
  const onChatDragLeave = event => {
    if(!event.currentTarget.contains(event.relatedTarget))setDragActive(false);
  };
  const onChatDrop = async event => {
    if(streaming||pendingAction)return;
    event.preventDefault();
    setDragActive(false);
    try{
      await addDroppedImages(event.dataTransfer);
    }catch(error){
      setMessages(current=>[...current,{role:'assistant',content:chatErrorMessage(error)}]);
    }
  };

  const clearMemory = async () => {
    if(!window.confirm('Clear saved conversation memory?'))return;
    localStorage.removeItem(CHAT_MEMORY_KEY);
    setMessages(INITIAL_CHAT_MESSAGES);
    try {
      const response=await fetch(`${API}/api/memory/clear`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sid:SID}),
      });
      const result=await response.json();
      if(!response.ok||result.error)throw new Error(result.error||`HTTP ${response.status}`);
      setMemoryFacts([]);
    } catch(error) {
      console.error('Failed to clear fact memory:', error);
    }
  };

  return (
    <div className={`main${dragActive?' chat-drag-active':''}`}
      onDragOver={onChatDragOver}
      onDragLeave={onChatDragLeave}
      onDrop={onChatDrop}>
      <MemoryFactsEditor
        open={memoryEditorOpen}
        initialFacts={memoryFacts}
        onClose={()=>setMemoryEditorOpen(false)}
        onSaved={setMemoryFacts}
      />
      <ChatHistoryEditor
        open={chatHistoryEditorOpen}
        messages={messages}
        onClose={()=>setChatHistoryEditorOpen(false)}
        onSaved={setMessages}
      />
      <div className="chat-messages">
        {messages.map((msg, i) => (
          <div key={msg.id||i} className={`msg ${msg.role}`}>
            <div className="msg-avatar">{msg.role === 'user' ? 'U' : 'G'}</div>
            <div>
              {msg.files && msg.files.length > 0 && (
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 6 }}>
                  {msg.files.map(fp => (
                    <div key={fp} className="file-pill" style={{ margin: 0, opacity: 0.8 }}>
                      <span>📄 {fp.split('/').pop()}</span>
                    </div>
                  ))}
                </div>
              )}
              {msg.images && msg.images.length > 0 && (
                <div className="chat-image-strip">
                  {msg.images.map(image => (
                    <div key={image.id||image.src} className="chat-image">
                      <img src={image.src} alt={image.name||'image'} draggable="true"
                        onDragStart={event=>dragImageTransfer(event,image)}
                        onDoubleClick={()=>openChatImage(image).catch(error=>
                          setMessages(current=>[...current,{role:'assistant',content:chatErrorMessage(error)}])
                        )}/>
                      <div className="chat-image-caption" title={image.name}>{image.name||'image'}</div>
                    </div>
                  ))}
                </div>
              )}
              <div className="msg-body">
                {msg.requestPending && (
                  <RequestProgress startedAt={msg.startedAt} delaySeconds={progressDelaySeconds}/>
                )}
                {msg.thinking && (
                  <div className="thinking">
                    <strong>Thinking…</strong>
                    {msg.thinking.length > 200
                      ? <div>{msg.thinking.slice(0, 200)}…</div>
                      : <div>{msg.thinking}</div>
                    }
                  </div>
                )}
                {msg.toolCall ? (
                  <div className="tool-card">
                    <div className="tool-card-head">
                      <strong>{msg.toolCall.tool}</strong>
                      <span>{msg.toolCall.cmd||msg.toolCall.path}</span>
                      <span style={{marginLeft:'auto'}}>{msg.status}</span>
                    </div>
                    {msg.proposal && <pre>{msg.proposal.patch}</pre>}
                    {msg.toolResult && <pre>{msg.toolResult}</pre>}
                    {pendingAction?.messageId===msg.id && (
                      <div className="tool-actions">
                        <button className="btn btn-ghost" onClick={()=>resolveAction(false)}>Reject</button>
                        <button className="btn btn-primary" onClick={()=>resolveAction(true)}>
                          {msg.toolCall.tool==='bash'?'Approve command':'Approve write'}
                        </button>
                      </div>
                    )}
                  </div>
                ) : renderMarkdown(msg.content)}
                {msg.role === 'assistant' && streaming && i === messages.length - 1 && !msg.content && (
                  <span style={{ color: 'var(--muted)' }}>▌</span>
                )}
              </div>
            </div>
          </div>
        ))}
        <div ref={messagesEndRef}/>
      </div>

      <div className="chat-input-area">
        <div className="chat-drop-hint">Drop images to attach them to this chat.</div>
        <div className="chat-memory-bar">
          <span>Memory: </span>
          <button className="chat-memory-link" onClick={()=>setChatHistoryEditorOpen(true)}
            disabled={streaming||Boolean(pendingAction)}>
            {messages.length} message{messages.length===1?'':'s'}
          </button>
          <span>, </span>
          <button className="chat-memory-link" onClick={()=>setMemoryEditorOpen(true)}
            disabled={streaming||Boolean(pendingAction)}>
            {memoryFacts.length} fact{memoryFacts.length===1?'':'s'}
          </button>
          <button className="chat-memory-clear" onClick={clearMemory}
            disabled={streaming||Boolean(pendingAction)}>Clear memory</button>
          <span>RAG:</span>
          <select className="rag-select" value={ragMode}
            disabled={streaming||Boolean(pendingAction)}
            onChange={event=>{
              setRagMode(event.target.value);
              localStorage.setItem('kai-workbench-rag-mode',event.target.value);
            }}>
            <option value="auto">auto</option>
            <option value="on">on</option>
            <option value="off">off</option>
          </select>
        </div>
        {attachedFiles.length > 0 && (
          <div className="chat-input-files">
            {attachedFiles.map(fp => (
              <div key={fp} className="file-pill">
                <span>📄 {fp.split('/').pop()}</span>
                <button title="Remove" onClick={() => setAttachedFiles(fs => fs.filter(f => f !== fp))}>×</button>
              </div>
            ))}
          </div>
        )}
        {attachedImages.length > 0 && (
          <div className="chat-image-strip">
            {attachedImages.map(image => (
              <div key={image.id||image.src} className="chat-image">
                <img src={image.src} alt={image.name||'image'} draggable="true"
                  onDragStart={event=>dragImageTransfer(event,image)}
                  onDoubleClick={()=>openChatImage(image).catch(error=>
                    setMessages(current=>[...current,{role:'assistant',content:chatErrorMessage(error)}])
                  )}/>
                <div className="chat-image-caption" title={image.name}>{image.name||'image'}</div>
                <button className="chat-image-remove" title="Remove"
                  onClick={() => setAttachedImages(images => images.filter(item => item !== image))}>×</button>
              </div>
            ))}
          </div>
        )}
        <div className="chat-input-row">
          <textarea
            ref={taRef}
            value={input}
            onChange={onInputChange}
            onKeyDown={onKeyDown}
            placeholder="Message…"
            disabled={streaming||Boolean(pendingAction)}
            rows={1}
          />
          <button className="btn btn-primary"
            onClick={streaming?()=>abortRef.current?.abort():send}
            disabled={Boolean(pendingAction)||(!streaming&&!input.trim()&&attachedFiles.length===0&&attachedImages.length===0)}>
            {streaming ? 'Stop' : '↑'}
          </button>
        </div>
      </div>
    </div>
  );
}

function ModelInstallModal({state,onClose,onStop}){
  if(!state)return null;
  const busy=state.status==='installing';
  const percent=Number.isFinite(state.percent)?Math.max(0,Math.min(100,Math.round(state.percent))):null;
  const [now,setNow]=useState(Date.now());
  useEffect(()=>{
    if(!busy)return;
    const timer=setInterval(()=>setNow(Date.now()),1000);
    return()=>clearInterval(timer);
  },[busy]);
  const elapsed=busy&&state.startedAt ? Math.max(0,Math.floor((now-state.startedAt)/1000)) : null;
  return (
    <div className="memory-editor-backdrop" role="dialog" aria-modal="true" aria-label="Model install">
      <div className="memory-editor" style={{height:'auto',maxHeight:'min(520px, calc(100vh - 48px))'}}>
        <div className="memory-editor-head">
          <strong>Install Model</strong>
          <span>{state.model}</span>
          <span className="memory-editor-status" style={{color:state.status==='failed'?'var(--warn)':state.status==='installed'?'var(--accent2)':'var(--muted)'}}>
            {state.status}
          </span>
          {busy&&<button className="btn btn-ghost" style={{fontSize:11,padding:'4px 10px'}}
            onClick={onStop}>Stop</button>}
          <button className="btn btn-ghost" style={{fontSize:11,padding:'4px 10px'}}
            onClick={onClose}>Close</button>
        </div>
        <div className="model-install-body">
          <div className="model-install-progress">
            {busy&&<span className="model-install-spinner" aria-hidden="true"/>}
            <span>{busy?'Downloading model':'Install request finished.'}</span>
            {percent!==null&&<strong>{percent}% downloaded</strong>}
          </div>
          <div className="model-install-track" aria-hidden={percent===null}>
            <div className="model-install-bar" style={{width:`${percent??0}%`}}/>
          </div>
          {state.statusText&&<div>{state.statusText}{elapsed!==null&&busy?` (${elapsed}s)`:''}</div>}
          {state.target&&<div>Model path: {state.target}</div>}
          {state.error&&<div style={{color:'var(--warn)',marginTop:10}}>{state.error}</div>}
        </div>
      </div>
    </div>
  );
}

// ── Root App ───────────────────────────────────────────────────────────────
function App() {
  const [rtab, setRtab]         = useState('bash');
  const [status, setStatus]     = useState('checking');
  const [injectedFile, setInj]  = useState(null);
  const [rightWidth, setRightWidth] = useState(() => Number(localStorage.getItem('kai-workbench-right-width')) || 520);
  const [resizing, setResizing] = useState(false);
  const [rhoMirror, setRhoMirror] = useState('');
  const [rhoDraft, setRhoDraft] = useState('');
  const [piDraft, setPiDraft] = useState('');
  const [cwd, setCwd]             = useState('');
  const [root, setRoot]           = useState('');
  const [viewFile, setViewFile]   = useState(null);
  const [models, setModels]       = useState([]);
  const [modelInfo, setModelInfo] = useState([]);
  const [selectedModel, setSelectedModel] = useState('');
  const [modelError, setModelError] = useState('');
  const [installState,setInstallState] = useState(null);
  const installAbortRef = useRef(null);
  const [vram, setVram] = useState(null);
  const [ram, setRam] = useState(null);

  useEffect(() => {
    const check = () => {
      fetch(`${API}/api/health?sid=${encodeURIComponent(SID)}`)
        .then(r => {if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json();})
        .then(data => {setStatus('online');if(data.model)setSelectedModel(data.model);})
        .catch(() => setStatus('error'));
    };
    check();
    const t = setInterval(check, 8000);
    return () => clearInterval(t);
  }, []);

  const loadModels = async () => {
    const response=await fetch(`${API}/api/models?sid=${encodeURIComponent(SID)}`);
    const body=await response.json();
    if(!response.ok||body.error)throw new Error(body.error||`HTTP ${response.status}`);
    setModels(body.models||[]);
    setModelInfo(body.modelInfo||[]);
    return body;
  };

  const installModel = async (model) => {
    setModelError('');
    setInstallState({model,status:'installing',target:'global Ollama model path',percent:null,statusText:'Fetching model manifest',startedAt:Date.now()});
    const controller=new AbortController();
    installAbortRef.current=controller;
    try{
      const response=await fetch(`${API}/api/models/install`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sid:SID,model}),
        signal:controller.signal,
      });
      if(!response.ok){
        const result=await response.json().catch(()=>({}));
        throw new Error(result.error||`HTTP ${response.status}`);
      }
      const reader=response.body.getReader();
      const dec=new TextDecoder();
      let buffer='',doneEvent=null;
      while(true){
        const {done,value}=await reader.read();
        if(done)break;
        buffer+=dec.decode(value,{stream:true});
        const lines=buffer.split('\n');buffer=lines.pop();
        for(const line of lines){
          if(!line.trim())continue;
          const event=JSON.parse(line);
          if(event.type==='start')setInstallState(current=>({...current,target:event.target,statusText:event.statusText||current.statusText,startedAt:current.startedAt||Date.now()}));
          else if(event.type==='progress')setInstallState(current=>({
            ...current,
            statusText:event.statusText||current.statusText,
            percent:Number.isFinite(event.percent)?event.percent:current.percent
          }));
          else if(event.type==='done')doneEvent=event;
          else if(event.type==='error')throw new Error(event.error||'model install failed');
        }
      }
      if(!doneEvent)throw new Error('model install ended without completion');
      setModels(doneEvent.models||[]);
      setModelInfo(doneEvent.modelInfo||[]);
      setInstallState({model,status:'installed',target:doneEvent.target,percent:100,statusText:'Installed',startedAt:Date.now()});
      await chooseModel(model,doneEvent.modelInfo||[]);
    }catch(error){
      const stopped=error.name==='AbortError';
      const message=stopped?'Install stopped.':error.message;
      setModelError(message);
      setInstallState(current=>({...current,model,status:stopped?'stopped':'failed',error:message,statusText:stopped?'Stopped by user':current?.statusText,startedAt:current?.startedAt||Date.now()}));
    }finally{
      if(installAbortRef.current===controller)installAbortRef.current=null;
    }
  };
  const stopInstall = () => installAbortRef.current?.abort();

  const chooseModel = async (model,infoList=modelInfo) => {
    setModelError('');
    const info=infoList.find(item=>item.id===model);
    if(info&&!info.installed){
      installModel(model);
      return;
    }
    try{
      const response=await fetch(`${API}/api/session/model`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({sid:SID,model}),
      });
      const result=await response.json();
      if(!response.ok||result.error)throw new Error(result.error||`HTTP ${response.status}`);
      setSelectedModel(result.model);
      localStorage.setItem('kai-workbench-selected-model',result.model);
    }catch(error){setModelError(error.message);}
  };

  useEffect(() => {
    loadModels()
      .then(body=>{
        const preferred=localStorage.getItem('kai-workbench-selected-model');
        const next=preferred&&body.models.includes(preferred)?preferred:body.selected;
        setSelectedModel(next);
        if(next&&next!==body.selected)chooseModel(next,body.modelInfo||[]);
      })
      .catch(error=>setModelError(error.message));
  }, []);

  useEffect(() => {
    const check = () => {
      fetch(`${API}/api/resources`)
        .then(response => response.json())
        .then(data => {setVram(data.vram);setRam(data.ram);})
        .catch(error => {
          setVram({available:false,error:error.message});
          setRam({available:false,error:error.message});
        });
    };
    check();
    const timer=setInterval(check,5000);
    return () => clearInterval(timer);
  }, []);

  useEffect(() => {
    fetch(`${API}/api/session?sid=${encodeURIComponent(SID)}`)
      .then(r => r.json())
      .then(d => { if (d.cwd) setCwd(d.cwd); if (d.root) setRoot(d.root); })
      .catch(() => {});
  }, []);

  const injectToChat = (fp) => {
    setInj(fp);
    setRtab('bash');
  };
  const pasteContinuationToPi = value => {
    setPiDraft(value);
    setRtab('pi');
  };
  const openTreeObjectInRho = value => {
    setRhoDraft(value);
    setRhoMirror(value);
    setRtab('rho');
  };

  const resizeRight = (event) => {
    event.preventDefault();
    const startX = event.clientX;
    const startWidth = rightWidth;
    setResizing(true);
    document.body.style.cursor = 'col-resize';
    const move = (moveEvent) => {
      const maxWidth = Math.max(320, window.innerWidth - 420);
      setRightWidth(Math.max(320, Math.min(maxWidth, startWidth + startX - moveEvent.clientX)));
    };
    const stop = () => {
      setResizing(false);
      document.body.style.cursor = '';
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', stop);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', stop);
  };

  useEffect(() => {
    localStorage.setItem('kai-workbench-right-width', String(Math.round(rightWidth)));
  }, [rightWidth]);
  const selectedModelInfo=modelInfo.find(model=>model.id===selectedModel)||
    (selectedModel?{id:selectedModel,label:selectedModel,installed:models.includes(selectedModel),vram:'Unknown',ram:'Unknown',fit:'Active model'}:null);

  return (
    <>
      <ModelInstallModal state={installState} onClose={()=>setInstallState(null)} onStop={stopInstall}/>
      <div className="header">
        <span className="header-logo">KaiWorkbench</span>
        <select className="model-select" value={selectedModel} onChange={event=>chooseModel(event.target.value)}
          disabled={modelInfo.length===0} title={modelError||modelTitle(selectedModelInfo)}>
          {models.length===0 && <option value="">No models found</option>}
          {modelInfo.map(model=><option key={model.id} value={model.id} title={modelTitle(model)}>
            {modelOptionLabel(model)}
          </option>)}
        </select>
        <span className="header-status model-hint" title={modelError||modelTitle(selectedModelInfo)}>
          {modelError||`${selectedModelInfo?.vram||'VRAM ?'} VRAM`}
        </span>
        <span className="usage-badges">
          <span className="resource-badge vram-badge" title={vramTitle(vram)}><strong>{vramLabel(vram)}</strong></span>
          <span className="resource-badge ram-badge" title={ramTitle(ram)}><strong>{ramLabel(ram)}</strong></span>
        </span>
        <span className="header-dot" style={{background: status==='online'?'var(--accent2)': status==='error'?'var(--warn)':'#555', boxShadow: status==='online'?'0 0 6px var(--accent2)':undefined }}/>
        <span className="header-status">{status}</span>
        <span className="header-model" title={cwd}>{cwd || '~'}</span>
      </div>

      <div className="workspace">
        <FileBrowser cwd={cwd} root={root} onInject={injectToChat} onOpenFile={setViewFile} onCwdChange={setCwd}/>
        <div className="main" style={{display:viewFile?'none':'flex'}}>
          <ChatPanel injectedFile={injectedFile} onClearInject={()=>setInj(null)} onCwdChange={setCwd}/>
        </div>
        {viewFile && <FileViewerPanel filePath={viewFile} onClose={()=>setViewFile(null)}/>}
        <div className={`right-resizer${resizing?' dragging':''}`} onPointerDown={resizeRight} title="Drag to resize side panel"/>
        <div className="right" style={{width:rightWidth}}>
          <div className="right-tabs">
            {['bash','pi','rho','debugger','tree'].map(t => (
              <button key={t} className={`right-tab${rtab===t?' active':''}`} onClick={()=>setRtab(t)}>
                {t==='bash'?'Bash':t==='pi'?'Pi':t==='rho'?'Rho':t==='debugger'?'Debug':'Tree'}
              </button>
            ))}
          </div>
          <div className="main">
            {rtab === 'bash' && <ReplPanel cwd={cwd} onCwdChange={setCwd}/>}
            {rtab !== 'bash' && <KaiConsolePanel
              view={rtab}
              rhoMirror={rhoMirror}
              onMirrorChange={setRhoMirror}
              rhoDraft={rhoDraft}
              onConsumeRhoDraft={()=>setRhoDraft('')}
              piDraft={piDraft}
              onConsumePiDraft={()=>setPiDraft('')}
              onPasteContinuation={pasteContinuationToPi}
              onOpenTreeObject={openTreeObjectInRho}
            />}
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
